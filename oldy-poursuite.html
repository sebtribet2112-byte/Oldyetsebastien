// ═══════════════════════════════════════════════════════
//  UTILITAIRES
// ═══════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ═══════════════════════════════════════════════════════
//  COMPOSANT : CAMEMBERT SVG
// ═══════════════════════════════════════════════════════
function Camembert({ pieces, size = 60 }) {
  const n = CAT.length;
  const c = size / 2;
  const r = c - 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={c} cy={c} r={r} fill="#F3F4F6" />
      {CAT.map((cat, i) => {
        const a1 = (i / n) * 2 * Math.PI - Math.PI / 2;
        const a2 = ((i + 1) / n) * 2 * Math.PI - Math.PI / 2;
        const x1 = c + r * Math.cos(a1);
        const y1 = c + r * Math.sin(a1);
        const x2 = c + r * Math.cos(a2);
        const y2 = c + r * Math.sin(a2);
        const filled = pieces instanceof Set ? pieces.has(cat.id) : false;
        return (
          <path
            key={cat.id}
            d={`M${c},${c} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r},0,0,1,${x2.toFixed(2)},${y2.toFixed(2)}Z`}
            fill={filled ? cat.color : "#E5E7EB"}
            stroke="white"
            strokeWidth="1.5"
          />
        );
      })}
      <circle cx={c} cy={c} r={r * 0.28} fill="white" />
    </svg>
  );
}

              <div key={cat.id} style={{ background: cat.light, borderRadius: 10, padding: "8px 12px", display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 18 }}>{cat.icon}</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: cat.color }}>{cat.name}</span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 10, fontSize: 12, color: "#6B7280", textAlign: "center" }}>
            Collectionne les 6 camemberts pour gagner !
          </div>
        </div>

        <button onClick={startGame} style={{ width: "100%", background: "#1E4D10", color: "white", fontSize: 17, fontWeight: 800, padding: "16px", borderRadius: 16, border: "none", cursor: "pointer", letterSpacing: 0.5 }}>
          COMMENCER LA PARTIE 🎲
        </button>
      </div>
    </div>
  );

  // ──────────────── WIN ────────────────
  if (screen === "win") return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #0d2b07, #1E4D10, #2d6b1a)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: ff }}>
      <div style={{ fontSize: 80 }}>🏆</div>
      <div style={{ fontSize: 30, fontWeight: 900, color: "#C9A227", textAlign: "center", marginTop: 12 }}>FÉLICITATIONS !</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: "white", textAlign: "center", marginTop: 6 }}>{winner?.name}</div>
      <div style={{ color: "#a7f3d0", fontSize: 15, marginTop: 4 }}>a remporté la partie !</div>

      <div style={{ marginTop: 20 }}>
        <Camembert pieces={winner?.pieces || new Set()} size={120} />
      </div>

      <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 20, padding: 20, marginTop: 20, maxWidth: 340, width: "100%", backdropFilter: "blur(10px)", border: "1px solid rgba(255,255,255,0.1)" }}>
        <div style={{ color: "#86efac", fontSize: 12, textAlign: "center", marginBottom: 12, fontWeight: 600, letterSpacing: 2, textTransform: "uppercase" }}>Scores finaux</div>
        {players.map(p => (
          <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <Camembert pieces={p.pieces} size={32} />
              <span style={{ color: p.id === winner?.id ? "#C9A227" : "#dcfce7", fontWeight: p.id === winner?.id ? 700 : 400, fontSize: 14 }}>{p.name}</span>
            </div>
            <span style={{ color: "#86efac", fontWeight: 700, fontSize: 14 }}>{p.pieces.size}/6</span>
          </div>
        ))}
      </div>

      <div style={{ background: "rgba(201,162,39,0.1)", borderRadius: 16, padding: "12px 20px", marginTop: 16, maxWidth: 320, border: "1px solid rgba(201,162,39,0.2)" }}>
        <div style={{ color: "#fde68a", fontSize: 13, textAlign: "center", lineHeight: 1.5 }}>
          🌿 Bravo ! Partagez ces connaissances autour de vous pour<br /><strong>Rendre Visible l'Invisible</strong>
        </div>
      </div>

      <div style={{ display: "flex", gap: 12, marginTop: 24 }}>
        <button onClick={() => setScreen("welcome")} style={{ background: "rgba(255,255,255,0.1)", color: "white", fontSize: 14, fontWeight: 600, padding: "12px 24px", borderRadius: 50, border: "1px solid rgba(255,255,255,0.2)", cursor: "pointer" }}>
          Accueil
        </button>
        <button onClick={startGame} style={{ background: "linear-gradient(135deg, #C9A227, #e8c14a)", color: "#1E4D10", fontSize: 14, fontWeight: 800, padding: "12px 28px", borderRadius: 50, border: "none", cursor: "pointer" }}>
          Rejouer 🔄
        </button>
      </div>
    </div>
  );

  // ──────────────── GAME ────────────────
  return (
    <div style={{ minHeight: "100vh", background: "#F8FAFC", fontFamily: ff }}>
      {/* Header players */}
      <div style={{ background: "#1E4D10", padding: "10px 14px", boxShadow: "0 2px 12px rgba(0,0,0,0.2)" }}>
        {players.length > 1 ? (
          <div style={{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 2 }}>
            {players.map((p, i) => (
              <div key={p.id} style={{ display: "flex", flexDirection: "column", alignItems: "center", minWidth: 70, opacity: i === pidx ? 1 : 0.45, transition: "opacity 0.2s" }}>
                <div style={{ border: i === pidx ? "2px solid #C9A227" : "2px solid transparent", borderRadius: "50%", padding: 1 }}>
                  <Camembert pieces={p.pieces} size={44} />
                </div>
                <div style={{ color: i === pidx ? "#C9A227" : "#86efac", fontSize: 10, fontWeight: i === pidx ? 700 : 400, marginTop: 3, maxWidth: 66, textAlign: "center", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</div>
                {i === pidx && <div style={{ background: "#C9A227", borderRadius: 6, padding: "1px 5px", fontSize: 8, color: "#1E4D10", fontWeight: 800, marginTop: 1 }}>EN JEU</div>}
              </div>
            ))}
          </div>
        ) : (
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <Camembert pieces={currentPlayer?.pieces || new Set()} size={52} />
            <div>
              <div style={{ color: "#C9A227", fontWeight: 700, fontSize: 16 }}>{currentPlayer?.name}</div>
              <div style={{ color: "#86efac", fontSize: 12 }}>{currentPlayer?.pieces?.size || 0} / 6 pièces collectées</div>
              <div style={{ display: "flex", gap: 4, marginTop: 4 }}>
                {CAT.map(cat => (
                  <div key={cat.id} style={{ width: 14, height: 14, borderRadius: "50%", background: currentPlayer?.pieces?.has(cat.id) ? cat.color : "rgba(255,255,255,0.15)", title: cat.name }} />
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      <div style={{ padding: "16px", maxWidth: 480, margin: "0 auto" }}>

        {/* ── CATÉGORIE ── */}
        {sub === "cat" && (
          <div>
            <div style={{ textAlign: "center", marginBottom: 18 }}>
              {players.length > 1 && <div style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 600, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>Tour de</div>}
              <div style={{ fontSize: 20, fontWeight: 800, color: "#1E4D10" }}>{players.length > 1 ? currentPlayer?.name : "Choisissez une catégorie"}</div>
              <div style={{ color: "#6B7280", fontSize: 13, marginTop: 3 }}>Quelle catégorie voulez-vous jouer ?</div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
              {CAT.map(cat => {
                const hasIt = currentPlayer?.pieces?.has(cat.id);
                return (
                  <button key={cat.id} onClick={() => pickCategory(cat.id)} style={{ background: hasIt ? cat.color : "white", border: `2px solid ${cat.color}`, borderRadius: 16, padding: "14px 10px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 5, position: "relative", boxShadow: "0 2px 8px rgba(0,0,0,0.06)", transition: "transform 0.1s, box-shadow 0.1s" }}>
                    <span style={{ fontSize: 26 }}>{cat.icon}</span>
                    <span style={{ fontSize: 11, fontWeight: 700, color: hasIt ? "white" : cat.color, textAlign: "center", lineHeight: 1.3 }}>{cat.name}</span>
                    {hasIt && <span style={{ position: "absolute", top: 6, right: 8, fontSize: 14 }}>✅</span>}
                  </button>
                );
              })}
            </div>

            <button onClick={() => pickCategory(CAT[Math.floor(Math.random() * CAT.length)].id)} style={{ width: "100%", background: "#1E4D10", color: "#C9A227", fontSize: 15, fontWeight: 700, padding: "14px", borderRadius: 14, border: "none", cursor: "pointer", letterSpacing: 0.5 }}>
              🎲 Catégorie aléatoire
            </button>
          </div>
        )}

        {/* ── QUESTION ── */}
        {sub === "q" && question && (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
              <div style={{ background: currentCat?.bg, color: currentCat?.color, padding: "5px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", gap: 5 }}>
                <span>{currentCat?.icon}</span> {currentCat?.name}
              </div>
              {question.isTrap && (
                <div style={{ background: "#FEF3C7", color: "#B45309", padding: "5px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700, border: "1px solid #FDE68A", display: "flex", alignItems: "center", gap: 4 }}>
                  ⚠️ QUESTION PIÈGE
                </div>
              )}
            </div>

            <div style={{ background: "white", borderRadius: 18, padding: "20px", marginBottom: 18, boxShadow: "0 2px 16px rgba(30,77,16,0.08)", border: `2px solid ${currentCat?.color}20` }}>
              <div style={{ fontSize: 16, fontWeight: 600, color: "#111827", lineHeight: 1.55 }}>{question.question}</div>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
              {question.answers.map((ans, i) => {
                const letters = ["A", "B", "C", "D"];
                return (
                  <button key={i} onClick={() => pickAnswer(i)} style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "13px 14px", background: "white", border: "2px solid #E5E7EB", borderRadius: 14, cursor: "pointer", textAlign: "left", boxShadow: "0 1px 4px rgba(0,0,0,0.04)", transition: "border-color 0.1s, background 0.1s" }}>
                    <span style={{ background: currentCat?.color, color: "white", borderRadius: 8, width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 13, flexShrink: 0 }}>{letters[i]}</span>
                    <span style={{ fontSize: 14, color: "#374151", lineHeight: 1.45, paddingTop: 2 }}>{ans}</span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* ── RÉSULTAT ── */}
        {sub === "result" && question && (
          <div>
            <div style={{ background: isCorrect ? "#ECFDF5" : "#FEF2F2", border: `2px solid ${isCorrect ? "#059669" : "#DC2626"}`, borderRadius: 20, padding: "20px", marginBottom: 16, textAlign: "center" }}>
              <div style={{ fontSize: 52 }}>{isCorrect ? "✅" : "❌"}</div>
              <div style={{ fontSize: 21, fontWeight: 800, color: isCorrect ? "#059669" : "#DC2626", marginTop: 8 }}>
                {isCorrect ? "BONNE RÉPONSE !" : "RATÉ !"}
              </div>
              {question.isTrap && (
                <div style={{ fontSize: 13, color: "#D97706", fontWeight: 700, marginTop: 6, background: "#FEF3C7", display: "inline-block", padding: "4px 12px", borderRadius: 20 }}>
                  {isCorrect ? "⚠️ Piège déjoué ! Bravo !" : "⚠️ Tombé dans le piège !"}
                </div>
              )}
              {isCorrect && newPiece && (
                <div style={{ marginTop: 10, fontSize: 14, color: "#059669", fontWeight: 600 }}>
                  🧩 Nouvelle pièce : <span style={{ fontWeight: 800 }}>{currentCat?.name}</span> collectée !
                </div>
              )}
              {!isCorrect && (
                <div style={{ marginTop: 10, fontSize: 13, color: "#374151" }}>
                  Bonne réponse : <strong style={{ color: "#059669" }}>{["A", "B", "C", "D"][question.correct]}. {question.answers[question.correct]}</strong>
                </div>
              )}
            </div>

            {/* Récap réponses */}
            <div style={{ marginBottom: 14 }}>
              {question.answers.map((ans, i) => {
                const letters = ["A", "B", "C", "D"];
                const correct = i === question.correct;
                const chosen = i === answer;
                let bg = "white", border = "#E5E7EB", col = "#9CA3AF";
                if (correct) { bg = "#ECFDF5"; border = "#059669"; col = "#059669"; }
                else if (chosen && !correct) { bg = "#FEF2F2"; border = "#DC2626"; col = "#DC2626"; }
                return (
                  <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "9px 12px", background: bg, border: `1.5px solid ${border}`, borderRadius: 12, marginBottom: 6 }}>
                    <span style={{ background: correct ? "#059669" : chosen ? "#DC2626" : "#D1D5DB", color: "white", borderRadius: 6, width: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 12, flexShrink: 0 }}>{letters[i]}</span>
                    <span style={{ fontSize: 13, color: col, lineHeight: 1.4, flex: 1 }}>{ans}</span>
                    {correct && <span style={{ flexShrink: 0 }}>✅</span>}
                    {chosen && !correct && <span style={{ flexShrink: 0 }}>❌</span>}
                  </div>
                );
              })}
            </div>

            {/* Explication */}
            <div style={{ background: "#F0FDF4", border: "1px solid #BBF7D0", borderRadius: 16, padding: 16, marginBottom: 20 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#1E4D10", marginBottom: 6, letterSpacing: 1, textTransform: "uppercase" }}>💡 Le saviez-vous ?</div>
              <div style={{ fontSize: 13, color: "#374151", lineHeight: 1.6 }}>{question.explanation}</div>
            </div>

            <button onClick={nextTurn} style={{ width: "100%", background: "#1E4D10", color: "white", fontSize: 15, fontWeight: 700, padding: "15px", borderRadius: 14, border: "none", cursor: "pointer" }}>
              {winner ? "🏆 Voir les résultats" : players.length > 1 ? `Tour de ${players[(pidx + 1) % players.length]?.name} →` : "Question suivante →"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

    // Monte l'application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OldyPoursuite />);
  </script>

  <!-- Service Worker pour usage offline / installable Android -->
  <script>
    if ('serviceWorker' in navigator) {
      // SW inline encodé en base64
      const swSrc = `data:text/javascript;base64,CmNvbnN0IENBQ0hFID0gJ29sZHktdjEnOwpjb25zdCBBU1NFVFMgPSBbbG9jYXRpb24ucGF0aG5hbWVdOwpzZWxmLmFkZEV2ZW50TGlzdGVuZXIoJ2luc3RhbGwnLCBlID0+IHsKICBlLndhaXRVbnRpbChjYWNoZXMub3BlbihDQUNIRSkudGhlbihjID0+IGMuYWRkQWxsKEFTU0VUUykpKTsKICBzZWxmLnNraXBXYWl0aW5nKCk7Cn0pOwpzZWxmLmFkZEV2ZW50TGlzdGVuZXIoJ2ZldGNoJywgZSA9PiB7CiAgZS5yZXNwb25kV2l0aCgKICAgIGNhY2hlcy5tYXRjaChlLnJlcXVlc3QpLnRoZW4ociA9PiByIHx8IGZldGNoKGUucmVxdWVzdCkuY2F0Y2goKCkgPT4gY2FjaGVzLm1hdGNoKGUucmVxdWVzdCkpKQogICk7Cn0pOwo=`;
      // Créer un blob SW depuis la data URL
      fetch(swSrc).then(r => r.blob()).then(blob => {
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(() => {});
      }).catch(() => {});
    }

    // Bouton "Installer" personnalisé (Android Chrome)
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      const btn = document.getElementById('install-btn');
      if (btn) btn.style.display = 'flex';
    });
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      const btn = document.getElementById('install-btn');
      if (btn) btn.style.display = 'none';
    });
    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
      }
    }
  </script>

  <!-- Bouton installation flottant -->
  <div id="install-btn"
    onclick="installApp()"
    style="display:none; position:fixed; bottom:16px; right:16px; z-index:9999;
           background:#C9A227; color:#1E4D10; font-family:'Sora',sans-serif;
           font-weight:800; font-size:12px; padding:10px 16px; border-radius:50px;
           box-shadow:0 4px 20px rgba(201,162,39,0.5); align-items:center; gap:8px;
           cursor:pointer; border:none;">
    📲 Installer l'appli
  </div>
</body>
