function buildPathoList(filter) {
  const ul = document.getElementById('pathoList');
  const q  = (filter||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  ul.innerHTML = PATHOLOGIES.map((p,i)=>{
    const norm = p.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if(q && !norm.includes(q)) return '';
    return `<li class="${q?'highlight':''}"><span class="patho-num">${i+1}.</span>${p}</li>`;
  }).join('');
}
function openModal(){ buildPathoList(''); document.getElementById('modalPathologies').classList.add('open'); document.querySelector('.modal-search').value=''; }
function closeModal(){ document.getElementById('modalPathologies').classList.remove('open'); }
function filterPatho(val){ buildPathoList(val); }

// ── État local persistant entre les re-renders ──
let playerCode   = null;
let playerData   = null;
let playerRef    = null;
let _currentRoom = 0;        // numéro de salle affiché actuellement
const hintShownPerRoom = {}; // { roomId: texte } — persiste entre les re-renders

firebase.initializeApp(firebaseConfig);
const escapeDb = firebase.database();

function showScreen(id){
  ['screenLogin','screenPlay','screenDone'].forEach(s=>{
    document.getElementById(s).style.display=(s===id)?'block':'none';
  });
}

// ── LOGIN ──
function doLogin(){
  const code=(document.getElementById('inputCode').value||'').trim().toUpperCase();
  const errEl=document.getElementById('loginErr');
  if(!PLAYERS_MAP[code]){errEl.textContent='❌ ACCÈS REFUSÉ — Identifiant inconnu.';return;}
  errEl.textContent='';
  playerCode=code;
  playerRef=escapeDb.ref('escape_v3/players/'+code);
  playerRef.once('value').then(snap=>{
    if(!snap.exists()){
      return playerRef.set({name:PLAYERS_MAP[code],room:1,score:0,done:false,r7choice:'',hintsTotal:0,connectedAt:Date.now()});
    }
  }).then(()=>{
    playerRef.on('value',snap=>{
      if(!snap.exists()) return;
      playerData=snap.val();
      onPlayerDataUpdate();
    });
  }).catch(err=>{errEl.textContent='⚠ Erreur Firebase : '+err.message;});
}

function onPlayerDataUpdate(){
  if(!playerData) return;
  if(playerData.done){renderDone();return;}
  renderPlay();
}

// ── RENDER PLAY — ne recrée pas l'image si même salle ──
function renderPlay(){
  showScreen('screenPlay');
  const roomIdx  = playerData.room-1;
  const roomInfo = ROOMS_DATA[roomIdx];
  const roomId   = roomInfo.id;

  document.getElementById('playName').textContent      = playerData.name;
  document.getElementById('playScore').textContent     = playerData.score;
  document.getElementById('playRoomBadge').textContent = 'S'+playerData.room;
  document.getElementById('playRoomTitle').textContent = roomInfo.title;

  // Image — crée une seule fois, met à jour si nouvelle salle
  let imgEl=document.getElementById('roomImg');
  if(!imgEl){
    imgEl=document.createElement('img');
    imgEl.id='roomImg'; imgEl.className='room-img';
    document.getElementById('playRoomBadge').before(imgEl);
  }
  if(roomInfo.img){ imgEl.src=roomInfo.img; imgEl.alt=roomInfo.title; imgEl.style.display='block'; }
  else { imgEl.style.display='none'; }

  // Mission — ne réécrit que si la salle change
  const salle_changee = (_currentRoom !== roomId);
  if(salle_changee){
    _currentRoom = roomId;
    document.getElementById('playMission').textContent = roomInfo.mission;
    document.getElementById('answerErr').textContent   = '';
    document.getElementById('dilemmeErr').textContent  = '';
    const inp=document.getElementById('inputAnswer');
    inp.value=''; inp.focus();
  }

  // Barre de progression
  const pct=Math.round(((playerData.room-1)/7)*100);
  document.getElementById('progressFill').style.width=pct+'%';

  // Indice — restaure si déjà utilisé pour cette salle
  const hintEl=document.getElementById('hintBox');
  if(hintShownPerRoom[roomId]){
    hintEl.textContent=hintShownPerRoom[roomId];
    hintEl.style.display='block';
    document.getElementById('btnHintCode').textContent='💡 Indice utilisé';
    document.getElementById('btnHintDilemme').textContent='💡 Indice utilisé';
  } else {
    hintEl.style.display='none';
    document.getElementById('btnHintCode').textContent='💡 INDICE (−20 pts)';
    document.getElementById('btnHintDilemme').textContent='💡 INDICE (−20 pts)';
  }

  // Sections salle 7 vs autres
  if(playerData.room===7){
    document.getElementById('sectionCode').style.display='none';
    document.getElementById('sectionDilemme').style.display='block';
    // Désactiver les boutons si choix déjà fait en local
    if(playerData.r7choice){
      document.getElementById('btnVisible').disabled=true;
      document.getElementById('btnInvisible').disabled=true;
    }
  } else {
    document.getElementById('sectionCode').style.display='block';
    document.getElementById('sectionDilemme').style.display='none';
  }
}

// ── VÉRIFIER RÉPONSE ──
function checkAnswer(){
  const val=(document.getElementById('inputAnswer').value||'').trim();
  const room=ROOMS_DATA[playerData.room-1];
  const errEl=document.getElementById('answerErr');
  if(!val) return;
  if(val===room.code){
    errEl.textContent=''; doAdvance();
  } else {
    errEl.textContent='❌ Code incorrect. Réessayez.';
    document.getElementById('inputAnswer').select();
  }
}

// ── AVANCER ──
function doAdvance(){
  const nextRoom=playerData.room+1;
  const newScore=playerData.score+100;
  _currentRoom=0; // force re-render salle suivante
  if(nextRoom>7){
    playerRef.update({room:nextRoom,score:newScore,done:true,completedAt:Date.now()});
  } else {
    playerRef.update({room:nextRoom,score:newScore});
  }
}

// ── SALLE 7 DILEMME ──
function chooseRoom7(choice){
  const errEl=document.getElementById('dilemmeErr');
  if(playerData.r7choice){ errEl.textContent='⚠ Vous avez déjà fait votre choix.'; return; }
  const penalty=(choice==='VISIBLE')?-50:0;
  document.getElementById('btnVisible').disabled=true;
  document.getElementById('btnInvisible').disabled=true;
  playerRef.update({
    r7choice:choice,
    score:playerData.score+penalty,
    done:true,
    completedAt:Date.now()
  });
}

// ── INDICE — stocké localement, ne se réinitialise pas au re-render ──
function useHint(){
  const room=ROOMS_DATA[playerData.room-1];
  const roomId=room.id;
  if(!room.hint) return;
  const hintEl=document.getElementById('hintBox');

  // Afficher l'indice dans tous les cas
  const txt='💡 '+room.hint;
  hintEl.textContent=txt;
  hintEl.style.display='block';
  hintShownPerRoom[roomId]=txt;
  document.getElementById('btnHintCode').textContent='💡 Indice utilisé';
  document.getElementById('btnHintDilemme').textContent='💡 Indice utilisé';

  // Déduire −20 pts une seule fois par salle (vérifier dans playerData)
  const hintsKey='hintUsed_r'+roomId;
  if(!playerData[hintsKey]){
    const update={score:Math.max(0,playerData.score-20), hintsTotal:(playerData.hintsTotal||0)+1};
    update[hintsKey]=true;
    playerRef.update(update);
  }
}

// ── ÉCRAN TERMINÉ ──
function renderDone(){
  showScreen('screenDone');
  document.getElementById('doneAgent').textContent='AGENT : '+(playerData.name||'');
  document.getElementById('doneScore').textContent=(playerData.score||0)+' pts';
  const r7=playerData.r7choice;
  const r7El=document.getElementById('doneR7');
  if(r7==='VISIBLE')        r7El.textContent='Salle 7 : vous avez choisi 🟦 VISIBLE (−50 pts)';
  else if(r7==='INVISIBLE') r7El.textContent='Salle 7 : vous avez choisi ⬜ INVISIBLE (±0 pts)';
  else r7El.textContent='';
}

// ── DÉCONNEXION ──
function doLogout(){
  if(playerRef) playerRef.off();
  playerCode=null; playerData=null; playerRef=null; _currentRoom=0;
  Object.keys(hintShownPerRoom).forEach(k=>delete hintShownPerRoom[k]);
  document.getElementById('inputCode').value='';
  document.getElementById('loginErr').textContent='';
  showScreen('screenLogin');
}
</script>
</body>
