function buildPathoList(filter) {
  const ul = document.getElementById('pathoList');
  const q  = (filter || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  ul.innerHTML = PATHOLOGIES.map((p, i) => {
    const norm  = p.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const match = !q || norm.includes(q);
    if (!match) return '';
    return `<li class="${q && match ? 'highlight' : ''}">
      <span class="patho-num">${i+1}.</span>${p}
    </li>`;
  }).join('');
}
function openModal()  {
  buildPathoList('');
  document.getElementById('modalPathologies').classList.add('open');
  document.querySelector('.modal-search').value = '';
}
function closeModal() { document.getElementById('modalPathologies').classList.remove('open'); }
function filterPatho(val) { buildPathoList(val); }

let playerCode   = null;

// ════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════
function showScreen(id) {
  ['screenLogin', 'screenPlay', 'screenDone'].forEach(sid => {
    document.getElementById(sid).style.display = (sid === id) ? 'block' : 'none';
  });
}

// ════════════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════════════
function doLogin() {
  const raw  = document.getElementById('inputCode').value || '';
  const code = raw.trim().toUpperCase();
  const errEl = document.getElementById('loginErr');

  if (!PLAYERS_MAP[code]) {
    errEl.textContent = '❌ ACCÈS REFUSÉ — Identifiant inconnu.';
    return;
  }
  errEl.textContent = '';
  playerCode = code;
  playerRef  = escapeDb.ref('escape_v3/players/' + code);

  playerRef.once('value').then(snap => {
    if (!snap.exists()) {
      return playerRef.set({
        name:       PLAYERS_MAP[code],
        room:       1,
        score:      0,
        done:       false,
        r7choice:   '',
        hintsTotal: 0,
        connectedAt: Date.now()
      });
    }
  }).then(() => {
    // Écoute temps réel
    playerRef.on('value', snap => {
      if (!snap.exists()) return;
      playerData = snap.val();
      onPlayerDataUpdate();
    });
  }).catch(err => {
    errEl.textContent = '⚠ Erreur Firebase : ' + err.message;
  });
}

// ════════════════════════════════════════════════════
//  RÉACTION AUX MISES À JOUR FIREBASE
// ════════════════════════════════════════════════════
function onPlayerDataUpdate() {
  if (!playerData) return;
  if (playerData.done) { renderDone(); return; }
  renderPlay();
}

// ════════════════════════════════════════════════════
//  AFFICHER L'ÉCRAN JEU
// ════════════════════════════════════════════════════
function renderPlay() {
  showScreen('screenPlay');

  const roomIdx  = playerData.room - 1;
  const roomInfo = ROOMS_DATA[roomIdx];
  hintUsedRoom   = false;

  document.getElementById('playName').textContent      = playerData.name;
  document.getElementById('playScore').textContent     = playerData.score;
  document.getElementById('playRoomBadge').textContent = 'S' + playerData.room;
  document.getElementById('playRoomTitle').textContent = roomInfo.title;
  document.getElementById('playMission').textContent   = roomInfo.mission;

  // Image de la salle
  let imgEl = document.getElementById('roomImg');
  if (!imgEl) {
    imgEl = document.createElement('img');
    imgEl.id        = 'roomImg';
    imgEl.className = 'room-img';
    document.getElementById('playMission').after(imgEl);
  }
  if (roomInfo.img) {
    imgEl.src   = roomInfo.img;
    imgEl.alt   = roomInfo.title;
    imgEl.style.display = 'block';
  } else {
    imgEl.style.display = 'none';
  }

  // Barre de progression (salle 1 = 0 %, salle 7 = 85 %, terminé = 100 %)
  const pct = Math.round(((playerData.room - 1) / 7) * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  // Reset hint
  const hintEl = document.getElementById('hintBox');
  hintEl.style.display = 'none';
  hintEl.textContent   = '';

  // Salle 7 vs autres
  if (playerData.room === 7) {
    document.getElementById('sectionCode').style.display    = 'none';
    document.getElementById('sectionDilemme').style.display = 'block';
    document.getElementById('dilemmeErr').textContent       = '';
  } else {
    document.getElementById('sectionCode').style.display    = 'block';
    document.getElementById('sectionDilemme').style.display = 'none';
    const inp = document.getElementById('inputAnswer');
    inp.value = '';
    inp.focus();
    document.getElementById('answerErr').textContent = '';
  }
}

// ════════════════════════════════════════════════════
//  VÉRIFIER LA RÉPONSE
// ════════════════════════════════════════════════════
function checkAnswer() {
  const val    = (document.getElementById('inputAnswer').value || '').trim();
  const room   = ROOMS_DATA[playerData.room - 1];
  const errEl  = document.getElementById('answerErr');
  if (!val) return;

  if (val === room.code) {
    errEl.textContent = '';
    doAdvance();
  } else {
    errEl.textContent = '❌ Code incorrect. Réessayez.';
    document.getElementById('inputAnswer').select();
  }
}

// ════════════════════════════════════════════════════
//  AVANCER À LA SALLE SUIVANTE
// ════════════════════════════════════════════════════
function doAdvance() {
  const nextRoom = playerData.room + 1;
  const newScore = playerData.score + 100;

  if (nextRoom > 7) {
    // Ne devrait pas arriver via checkAnswer (la salle 7 n'a pas de code)
    playerRef.update({ room: nextRoom, score: newScore, done: true, completedAt: Date.now() });
  } else {
    playerRef.update({ room: nextRoom, score: newScore });
  }
}

// ════════════════════════════════════════════════════
//  CHOIX SALLE 7
// ════════════════════════════════════════════════════
function chooseRoom7(choice) {
  const penalty = (choice === 'VISIBLE') ? -50 : 0;
  playerRef.update({
    r7choice:    choice,
    score:       playerData.score + penalty,
    done:        true,
    completedAt: Date.now()
  });
}

// ════════════════════════════════════════════════════
//  INDICE
// ════════════════════════════════════════════════════
function useHint() {
  const room   = ROOMS_DATA[playerData.room - 1];
  if (!room.hint) return;

  const hintEl = document.getElementById('hintBox');
  hintEl.textContent  = '💡 ' + room.hint;
  hintEl.style.display = 'block';

  if (!hintUsedRoom) {
    hintUsedRoom = true;
    playerRef.update({
      score:      playerData.score - 20,
      hintsTotal: (playerData.hintsTotal || 0) + 1
    });
  }
}

// ════════════════════════════════════════════════════
//  ÉCRAN TERMINÉ
// ════════════════════════════════════════════════════
function renderDone() {
  showScreen('screenDone');
  document.getElementById('doneAgent').textContent = 'AGENT : ' + (playerData.name || '');
  document.getElementById('doneScore').textContent = (playerData.score || 0) + ' pts';

  const r7 = playerData.r7choice;
  const r7El = document.getElementById('doneR7');
  if (r7 === 'VISIBLE')   r7El.textContent = 'Salle 7 : vous avez choisi 🟦 VISIBLE (−50 pts)';
  else if (r7 === 'INVISIBLE') r7El.textContent = 'Salle 7 : vous avez choisi ⬜ INVISIBLE (±0 pts)';
  else r7El.textContent = '';

  document.getElementById('progressFill').style.width = '100%';
}

// ════════════════════════════════════════════════════
//  DÉCONNEXION
// ════════════════════════════════════════════════════
function doLogout() {
  if (playerRef) playerRef.off();
  playerCode   = null;
  playerData   = null;
  playerRef    = null;
  hintUsedRoom = false;
  document.getElementById('inputCode').value    = '';
  document.getElementById('loginErr').textContent = '';
  showScreen('screenLogin');
}
</script>
</body>
</html>
